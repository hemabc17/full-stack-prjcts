<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Rock Paper Scissors</h1>

        <div class="choices">
            <button onclick="playGame('rock')">🪨 Rock</button>
            <button onclick="playGame('paper')">📄 Paper</button>
            <button onclick="playGame('scissors')">✂️ Scissors</button>
        </div>

        <div class="result">
            <p id="player-choice">Your Choice: </p>
            <p id="computer-choice">Computer Choice: </p>
            <h2 id="winner"></h2>
        </div>

        <div class="score">
            <p>Player: <span id="player-score">0</span></p>
            <p>Computer: <span id="computer-score">0</span></p>
        </div>

        <button class="reset" onclick="resetGame()">Reset Game</button>
    </div>

<script src="script.js"></script>
</body>
</html>
