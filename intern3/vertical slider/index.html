<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Vertical Slider</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- LEFT TEXT SECTION -->
    <div class="left">
        <div class="text-slider" id="textSlider">

            <div class="slide pink">
                <h1>Nature Flower</h1>
                <p>All in pink</p>
            </div>

            <div class="slide blue">
                <h1>Ocean View</h1>
                <p>Calm and peaceful</p>
            </div>

            <div class="slide green">
                <h1>Forest Life</h1>
                <p>Fresh and natural</p>
            </div>

        </div>
    </div>

    <!-- RIGHT IMAGE SECTION -->
   <div class="right">
        <div class="image-slider" id="imageSlider">

            <div class="image-slide">
                <img src="https://picsum.photos/900/1200?random=11">
            </div>

            <div class="image-slide">
                <img src="https://picsum.photos/900/1200?random=12">
            </div>

            <div class="image-slide">
                <img src="https://picsum.photos/900/1200?random=13">
            </div>
        </div>
    </div>

    <!-- CENTER BUTTONS -->
    <div class="buttons">
        <button id="up">▲</button>
        <button id="down">▼</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
