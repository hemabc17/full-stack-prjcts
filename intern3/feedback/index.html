<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card" id="card">

        <h2>How satisfied are you with our<br>customer support performance?</h2>

        <div class="ratings">
            <div class="rating">
                <span>😞</span>
                <small>Unhappy</small>
            </div>

            <div class="rating active">
                <span>😐</span>
                <small>Neutral</small>
            </div>

            <div class="rating">
                <span>😊</span>
                <small>Satisfied</small>
            </div>
        </div>

        <button id="send">Send Review</button>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
